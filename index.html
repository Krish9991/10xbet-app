<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT VIP BOOKIE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; --nav: #020617; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login Screen */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; background: #000; border: 1px solid #334155; color: var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 18px; font-family: 'Orbitron'; box-sizing: border-box; outline: none; }

        /* Header */
        header { background: var(--nav); padding: 12px 15px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-weight: 800; font-size: 20px; color: #fff; }
        .logo span { color: var(--primary); }
        .wallet-badge { background: #000; border: 1.5px solid var(--success); padding: 5px 15px; border-radius: 50px; font-weight: bold; color: var(--success); font-family: 'Orbitron'; font-size: 14px; }

        .app-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Lobby Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { background: var(--card); border-radius: 20px; padding: 25px 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .cat-card:active { transform: scale(0.95); }

        /* Aviator Area */
        .history-bar { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; margin-bottom: 10px; scrollbar-width: none; }
        .hist-item { background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 2px 8px; border-radius: 8px; font-size: 10px; font-family: 'Orbitron'; border: 1px solid #1e293b; }
        .aviator-box { background: #000; border-radius: 20px; height: 230px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid #1e293b; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 38px; z-index: 10; display: none; filter: drop-shadow(0 0 15px var(--danger)); transition: transform 0.1s linear; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        #countdown-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; }
        .timer-num { color: var(--accent); font-size: 70px; font-family: 'Orbitron'; font-weight: bold; }
        .crash-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: var(--danger); font-size: 28px; font-weight: bold; display: none; font-family: 'Orbitron'; }

        /* Controls */
        .bet-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; font-size: 20px; width: 100%; text-transform: uppercase; }
        .btn-bet { background: linear-gradient(180deg, var(--success), #059669); color: #000; box-shadow: 0 4px 0 #047857; }
        .btn-cash { background: linear-gradient(180deg, var(--accent), #d97706); color: #000; display: none; box-shadow: 0 4px 0 #b45309; }
        .btn-disabled { background: #1e293b !important; color: #475569 !important; box-shadow: none !important; cursor: not-allowed; }

        /* Profile & Admin */
        .admin-card { background: #000; border-left: 4px solid var(--primary); padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
        .bottom-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1e293b; z-index: 1000; }
        .tab-item { color: #64748b; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="snd-fly" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" loop preload="auto"></audio>
    <audio id="snd-crash" src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3" preload="auto"></audio>

    <div id="auth-screen">
        <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:35px; margin-bottom:30px;">10X<span>BAT</span></h1>
        <div class="auth-card">
            <input type="text" id="u-login" class="auth-input" placeholder="USERNAME">
            <input type="password" id="p-login" class="auth-input" placeholder="PASSWORD">
            <button class="btn btn-bet" onclick="doAuth()">LOGIN / SIGNUP</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="logo">10X<span>BAT</span></div>
            <div class="wallet-badge">₹ <span id="user-bal">0</span></div>
        </header>

        <div class="app-content">
            <div id="p-home" class="page active">
                <div style="background: linear-gradient(45deg, #1e293b, #0f172a); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);">
                    <h2 style="margin:0; font-family:'Orbitron';">OFFICIAL BOOKIE</h2>
                    <p style="color:#64748b; margin:5px 0 0;">Welcome, <span id="welcome-user" style="color:var(--primary)">User</span></p>
                </div>
                <div class="grid-2">
                    <div class="cat-card" onclick="nav('aviator'); startCountdown();">
                        <div style="font-size:45px; margin-bottom:10px;">🚀</div>
                        <h3 style="margin:0;">AVIATOR</h3>
                        <p style="color:var(--success); font-size:10px; font-weight:bold;">● LIVE NOW</p>
                    </div>
                    <div class="cat-card" onclick="alert('Cricket Live Soon!')">
                        <div style="font-size:45px; margin-bottom:10px;">🏏</div>
                        <h3 style="margin:0;">SPORTS</h3>
                        <p style="color:#64748b; font-size:10px;">IPL SPECIAL</p>
                    </div>
                </div>
            </div>

            <div id="p-aviator" class="page">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <button onclick="nav('home')" style="background:none; border:none; color:var(--primary); font-weight:bold; font-size:16px;">← BACK</button>
                    <div class="history-bar" id="hist-list"></div>
                </div>
                <div class="aviator-box">
                    <div id="countdown-box"><div id="timer-val" class="timer-num">3</div></div>
                    <div id="multiplier" style="display:none;">1.00x</div>
                    <div id="rocket">🚀</div>
                    <div id="crash-txt" class="crash-msg">FLEW AWAY!</div>
                </div>
                <div class="bet-box">
                    <input type="number" id="bet-amount" value="100" class="auth-input">
                    <button id="btn-bet" class="btn btn-bet" onclick="placeBet()">PLACE BET</button>
                    <button id="btn-cash" class="btn btn-cash" onclick="cashOut()">CASH OUT</button>
                </div>
            </div>

            <div id="p-profile" class="page">
                <div style="text-align:center; padding:30px; background:var(--card); border-radius:25px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05);">
                    <div style="width:80px; height:80px; background:var(--primary); border-radius:20px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:35px; color:#000; font-weight:bold;" id="u-char">K</div>
                    <h2 id="u-name-profile" style="margin:0; font-family:'Orbitron';">User</h2>
                    <p style="color:var(--success); font-size:14px; font-weight:bold; margin-top:5px;">VERIFIED ACCOUNT ✅</p>
                </div>
                <button class="btn" style="background:#1e293b; color:#fff; margin-bottom:10px;" onclick="alert('Request Sent to Admin!')">WITHDRAW FUNDS</button>
                <button class="btn" style="background:var(--danger); color:#fff;" onclick="doLogout()">LOGOUT ID</button>
                <div style="text-align:center; margin-top:40px; opacity:0.1; font-size:12px;" onclick="openMaster()">V 4.2.0 (STABLE)</div>
            </div>

            <div id="p-master" class="page">
                <button class="btn" style="background:var(--primary); color:#000; margin-bottom:20px;" onclick="nav('profile')">BACK TO PROFILE</button>
                <h2 style="color:var(--primary); font-family:'Orbitron';">MASTER PANEL</h2>
                <div id="user-list-admin">Loading users...</div>
            </div>
        </div>

        <div class="bottom-tabs">
            <div class="tab-item active" onclick="nav('home', this)"><span>🏠</span>Home</div>
            <div class="tab-item" onclick="nav('profile', this)"><span>👤</span>Profile</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser'), isPlaying = false, currentMul = 1.0, gameInterval, betAmt = 0, isBetPlaced = false, canPlaceBet = true;

        const sndTick = document.getElementById('snd-tick'), sndFly = document.getElementById('snd-fly'), sndCrash = document.getElementById('snd-crash');

        function doAuth() {
            let u = document.getElementById('u-login').value.trim();
            let p = document.getElementById('p-login').value.trim();
            if(!u || !p) return alert("All fields required!");
            db.ref('users/'+u).once('value', s => {
                if(s.exists()) {
                    if(s.val().password === p) { localStorage.setItem('activeUser',u); location.reload(); }
                    else alert("Wrong Password!");
                } else {
                    db.ref('users/'+u).set({password:p, balance:10000}).then(()=>{ localStorage.setItem('activeUser',u); location.reload(); });
                }
            });
        }

        function init() {
            if(!curU) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('u-name-profile').innerText = curU;
            document.getElementById('welcome-user').innerText = curU;
            document.getElementById('u-char').innerText = curU.charAt(0).toUpperCase();
            db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = Math.floor(s.val() || 0); });
            loadAdminUsers();
        }

        function nav(p, el) {
            if(p !== 'aviator') { clearInterval(gameInterval); sndFly.pause(); sndFly.currentTime = 0; isPlaying = false; }
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            if(el) { document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }
        }

        function startCountdown() {
            canPlaceBet = true; resetAviatorUI();
            let count = 3; document.getElementById('timer-val').innerText = count;
            let t = setInterval(() => {
                sndTick.play(); count--;
                if(count > 0) document.getElementById('timer-val').innerText = count;
                else { clearInterval(t); launchRocket(); }
            }, 1000);
        }

        function launchRocket() {
            canPlaceBet = false;
            document.getElementById('countdown-box').style.display = 'none';
            document.getElementById('multiplier').style.display = 'block';
            document.getElementById('rocket').style.display = 'block';
            sndFly.play(); isPlaying = true; currentMul = 1.0;
            
            db.ref('game_settings/aviator_crash').once('value', s => {
                let actualCrash = (Math.random() * ((s.val()||4.0) - 1.1) + 1.1).toFixed(2);
                gameInterval = setInterval(() => {
                    currentMul += 0.02 + (currentMul/160);
                    document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                    if(isBetPlaced) {
                        document.getElementById('btn-cash').style.display = 'block';
                        document.getElementById('btn-bet').style.display = 'none';
                        document.getElementById('btn-cash').innerText = "CASH OUT ₹" + Math.floor(betAmt * currentMul);
                    } else {
                        document.getElementById('btn-bet').classList.add('btn-disabled');
                        document.getElementById('btn-bet').innerText = "BET CLOSED";
                    }
                    let r = document.getElementById('rocket');
                    r.style.transform = `translate(${currentMul * 25}px, -${currentMul * 18}px) rotate(-45deg)`;
                    if(currentMul >= actualCrash) crashGame(actualCrash);
                }, 80);
            });
        }

        function crashGame(res) {
            clearInterval(gameInterval); isPlaying = false; isBetPlaced = false;
            sndFly.pause(); sndFly.currentTime = 0; sndCrash.play();
            document.getElementById('multiplier').style.color = 'var(--danger)';
            document.getElementById('crash-txt').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-bet').innerText = "PLACE BET";
            document.getElementById('btn-bet').classList.remove('btn-disabled');
            
            let h = document.createElement('div'); h.className='hist-item'; h.innerText=res+'x';
            document.getElementById('hist-list').prepend(h);
            setTimeout(() => { if(document.getElementById('p-aviator').classList.contains('active')) startCountdown(); }, 3000);
        }

        function placeBet() {
            if(!canPlaceBet) return;
            let a = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                if(s.val() >= a && a > 0) {
                    betAmt = a; isBetPlaced = true;
                    db.ref('users/'+curU).update({balance: s.val()-a});
                    document.getElementById('btn-bet').innerText = "WAITING...";
                    document.getElementById('btn-bet').classList.add('btn-disabled');
                }
            });
        }

        function cashOut() {
            if(!isPlaying || !isBetPlaced) return;
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val()+win});
                isBetPlaced = false; betAmt = 0;
                document.getElementById('btn-cash').style.display='none';
                document.getElementById('btn-bet').style.display='block';
                document.getElementById('btn-bet').innerText = "BET CLOSED";
            });
        }

        function resetAviatorUI() {
            document.getElementById('countdown-box').style.display = 'block';
            document.getElementById('multiplier').style.display = 'none';
            document.getElementById('multiplier').style.color = '#fff';
            document.getElementById('rocket').style.display = 'none';
            document.getElementById('rocket').style.transform = "translate(0,0) rotate(-45deg)";
            document.getElementById('crash-txt').style.display = 'none';
        }

        function openMaster() { if(prompt("ADMIN PIN:")==="9991") nav('master'); }
        function loadAdminUsers() {
            db.ref('users').on('value', s => {
                let h = ""; s.forEach(c => {
                    h += `<div class="admin-card"><span><b>${c.key}</b>: ₹${Math.floor(c.val().balance)}</span><button class="btn" style="width:auto; padding:5px 10px; font-size:12px; background:var(--primary);" onclick="editBal('${c.key}')">Edit</button></div>`;
                });
                document.getElementById('user-list-admin').innerHTML = h;
            });
        }
        function editBal(u) { let n = prompt("New balance for "+u); if(n) db.ref('users/'+u).update({balance:parseInt(n)}); }
        function doLogout() { localStorage.removeItem('activeUser'); location.reload(); }

        init();
    </script>
</body>
</html>
