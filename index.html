<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT OFFICIAL BOOKIE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* Mobile Header Fixed */
        header { background: #000; padding: 15px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; width: 100%; height: 65px; flex-shrink: 0; }
        .logo { font-family: 'Orbitron'; font-weight: 800; font-size: 18px; color: #fff; }
        .logo span { color: var(--primary); }
        .wallet-badge { background: #111; border: 1.5px solid var(--success); padding: 5px 12px; border-radius: 50px; font-weight: bold; color: var(--success); font-family: 'Orbitron'; font-size: 13px; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }

        /* Main Content Scrollable Area */
        .app-content { flex: 1; overflow-y: auto; width: 100%; position: relative; }
        .page { display: none; padding: 15px; width: 100%; }
        .page.active { display: block; }

        /* Dashboard Elements */
        .hero-banner { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cat-card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Aviator Game Area */
        .aviator-box { background: #000; border-radius: 20px; height: 230px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1.5px solid #1e293b; width: 100%; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 38px; z-index: 10; display: none; filter: drop-shadow(0 0 15px var(--danger)); transition: transform 0.1s linear; }
        #multiplier { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4); text-align: center; }
        
        .timer-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; }
        #timer-val { font-size: 70px; color: var(--accent); font-family: 'Orbitron'; font-weight: bold; }

        /* Buttons & Inputs */
        .bet-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .auth-input { width: 100%; background: #000; border: 1px solid #334155; color: var(--accent); padding: 15px; border-radius: 12px; text-align: center; font-size: 24px; font-family: 'Orbitron'; margin-bottom: 12px; outline: none; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; font-size: 20px; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn-bet { background: linear-gradient(180deg, var(--success), #059669); color: #000; }
        .btn-cash { background: linear-gradient(180deg, var(--accent), #d97706); color: #000; display: none; }

        /* Navigation Bar Fixed */
        .bottom-tabs { background: #000; padding: 10px 0; border-top: 1.5px solid #1e293b; display: flex; justify-content: space-around; height: 75px; flex-shrink: 0; }
        .tab-item { color: #64748b; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; }
        .tab-item.active { color: var(--primary); }

        /* Full Screen Auth Overlay */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 360px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-fly" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" loop></audio>
    <audio id="snd-crash" src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3"></audio>

    <div id="auth-screen">
        <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:38px; margin-bottom:30px;">10X<span>BAT</span></h1>
        <div class="auth-card">
            <input type="text" id="u-login" class="auth-input" placeholder="USERNAME" style="font-size:16px;">
            <input type="password" id="p-login" class="auth-input" placeholder="PASSWORD" style="font-size:16px;">
            <button class="btn btn-bet" onclick="doAuth()">LOGIN / JOIN</button>
        </div>
    </div>

    <header>
        <div class="logo">10X<span>BAT</span></div>
        <div class="wallet-badge">₹ <span id="user-bal">0</span></div>
    </header>

    <div class="app-content">
        <div id="p-home" class="page active">
            <div class="hero-banner">
                <h2 style="margin:0; font-family:'Orbitron'; font-size:20px; color:var(--primary);">DASHBOARD</h2>
                <p style="color:#64748b; margin:5px 0 0; font-size:14px; font-weight:bold;">Welcome Back, <span id="welcome-user">Krish_1</span></p>
            </div>
            <div class="grid-2">
                <div class="cat-card" onclick="nav('aviator'); startCountdown();">
                    <div style="font-size:45px; margin-bottom:10px;">🚀</div>
                    <h3 style="margin:0;">AVIATOR</h3>
                    <p style="color:var(--success); font-size:11px; font-weight:bold;">● LIVE</p>
                </div>
                <div class="cat-card" onclick="nav('profile')">
                    <div style="font-size:45px; margin-bottom:10px;">👤</div>
                    <h3 style="margin:0;">PROFILE</h3>
                    <p style="color:#64748b; font-size:11px;">SETTINGS</p>
                </div>
            </div>
        </div>

        <div id="p-aviator" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button onclick="nav('home')" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:8px 15px; border-radius:10px; font-weight:bold;">← BACK</button>
                <div id="hist-list" style="display:flex; gap:5px; overflow-x:auto;"></div>
            </div>
            <div class="aviator-box">
                <div id="countdown-box" class="timer-box"><div id="timer-val">3</div></div>
                <div id="multiplier" style="display:none;">1.00x</div>
                <div id="rocket">🚀</div>
                <div id="crash-txt" style="position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); color:var(--danger); font-size:28px; font-weight:bold; display:none; font-family:'Orbitron';">FLEW AWAY!</div>
            </div>
            <div class="bet-box">
                <input type="number" id="bet-amount" value="100" class="auth-input">
                <button id="btn-bet" class="btn btn-bet" onclick="placeBet()">PLACE BET</button>
                <button id="btn-cash" class="btn btn-cash" onclick="cashOut()">CASH OUT</button>
            </div>
        </div>

        <div id="p-profile" class="page">
            <div style="text-align:center; padding:30px; background:var(--card); border-radius:25px; border:1px solid rgba(255,255,255,0.05); width:100%;">
                <div style="width:80px; height:80px; background:var(--primary); border-radius:20px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:35px; color:#000; font-weight:bold;" id="u-char">K</div>
                <h2 id="u-name-profile" style="margin:0; font-family:'Orbitron'; font-size:20px;">User</h2>
            </div>
            <button class="btn" style="background:var(--danger); color:#fff; margin-top:20px;" onclick="localStorage.clear(); location.reload();">LOGOUT ID</button>
            <div style="text-align:center; margin-top:40px; opacity:0.1;" onclick="if(prompt('PIN:')==='9991') nav('master');">V 4.2.0</div>
        </div>
    </div>

    <div class="bottom-tabs">
        <div class="tab-item active" onclick="nav('home', this)"><span>🏠</span>Home</div>
        <div class="tab-item" onclick="nav('profile', this)"><span>👤</span>Profile</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser'), isPlaying = false, currentMul = 1.0, gameInterval, betAmt = 0, isBetPlaced = false, canPlaceBet = true;

        const sndTick = document.getElementById('snd-tick'), sndFly = document.getElementById('snd-fly'), sndCrash = document.getElementById('snd-crash');

        function doAuth() {
            let u = document.getElementById('u-login').value.trim();
            let p = document.getElementById('p-login').value.trim();
            if(!u || !p) return alert("Fill data!");
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val().password === p) { localStorage.setItem('activeUser',u); location.reload(); }
                else if(!s.exists()) { db.ref('users/'+u).set({password:p, balance:1000}).then(()=>{ localStorage.setItem('activeUser',u); location.reload(); }); }
                else alert("Wrong Password!");
            });
        }

        function init() {
            if(curU) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('u-name-profile').innerText = curU;
                document.getElementById('welcome-user').innerText = curU;
                document.getElementById('u-char').innerText = curU.charAt(0).toUpperCase();
                db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = Math.floor(s.val() || 0); });
            }
        }

        function nav(p, el) {
            if(p !== 'aviator') { clearInterval(gameInterval); sndFly.pause(); isPlaying = false; }
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            if(el) { document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }
        }

        function startCountdown() {
            canPlaceBet = true; resetUI();
            let count = 3; document.getElementById('timer-val').innerText = count;
            let t = setInterval(() => {
                sndTick.play(); count--;
                if(count > 0) document.getElementById('timer-val').innerText = count;
                else { clearInterval(t); launchRocket(); }
            }, 1000);
        }

        function launchRocket() {
            canPlaceBet = false;
            document.getElementById('countdown-box').style.display = 'none';
            document.getElementById('multiplier').style.display = 'block';
            document.getElementById('rocket').style.display = 'block';
            sndFly.play(); isPlaying = true; currentMul = 1.0;
            db.ref('game_settings/aviator_crash').once('value', s => {
                let actualCrash = (Math.random() * ((s.val()||3.0) - 1.1) + 1.1).toFixed(2);
                gameInterval = setInterval(() => {
                    currentMul += 0.02 + (currentMul/160);
                    document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                    if(isBetPlaced) {
                        document.getElementById('btn-cash').style.display = 'block';
                        document.getElementById('btn-bet').style.display = 'none';
                        document.getElementById('btn-cash').innerText = "CASH OUT ₹" + Math.floor(betAmt * currentMul);
                    }
                    let r = document.getElementById('rocket');
                    r.style.transform = `translate(${currentMul * 20}px, -${currentMul * 15}px) rotate(-45deg)`;
                    if(currentMul >= actualCrash) crashGame(actualCrash);
                }, 80);
            });
        }

        function crashGame(res) {
            clearInterval(gameInterval); isPlaying = false; isBetPlaced = false;
            sndFly.pause(); sndFly.currentTime = 0; sndCrash.play();
            document.getElementById('multiplier').style.color = 'red';
            document.getElementById('crash-txt').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-bet').innerText = "PLACE BET";
            setTimeout(() => { if(document.getElementById('p-aviator').classList.contains('active')) startCountdown(); }, 3000);
        }

        function placeBet() {
            if(!canPlaceBet) return;
            let a = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                if(s.val() >= a && a > 0) { betAmt = a; isBetPlaced = true; db.ref('users/'+curU).update({balance: s.val()-a}); document.getElementById('btn-bet').innerText = "WAITING..."; }
            });
        }

        function cashOut() {
            if(!isPlaying || !isBetPlaced) return;
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val()+win});
                isBetPlaced = false; betAmt = 0; document.getElementById('btn-cash').style.display='none'; document.getElementById('btn-bet').style.display='block';
            });
        }

        function resetUI() {
            document.getElementById('countdown-box').style.display = 'block';
            document.getElementById('multiplier').style.display = 'none';
            document.getElementById('multiplier').style.color = '#fff';
            document.getElementById('rocket').style.display = 'none';
            document.getElementById('rocket').style.transform = "translate(0,0) rotate(-45deg)";
            document.getElementById('crash-txt').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
