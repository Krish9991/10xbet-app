<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT VIP PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; }
        
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #020617, transparent); }

        /* Modern Header */
        header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .pfp { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), #818cf8); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 18px; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .wallet { background: #000; border: 1.5px solid var(--success); padding: 5px 15px; border-radius: 50px; font-weight: bold; color: var(--success); font-size: 14px; box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.2); font-family: 'Orbitron'; }

        .app-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Lobby Cards */
        .section-title { font-family: 'Orbitron'; font-size: 16px; margin-bottom: 20px; color: var(--primary); letter-spacing: 1px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: var(--card); backdrop-filter: blur(5px); border-radius: 20px; padding: 25px 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .game-card:active { transform: scale(0.95); background: rgba(56, 189, 248, 0.1); }
        .game-icon { font-size: 45px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        /* Aviator Pro UI */
        .aviator-box { background: #000; border: 2px solid #1e293b; border-radius: 20px; height: 230px; position: relative; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(56, 189, 248, 0.3); }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 35px; z-index: 10; display: none; filter: drop-shadow(0 0 15px var(--danger)); }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.5); }
        #timer-val { font-size: 70px; color: var(--accent); font-family: 'Orbitron'; text-shadow: 0 0 20px var(--accent); }

        .bet-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .auth-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #334155; color: var(--accent); padding: 15px; border-radius: 12px; text-align: center; font-size: 22px; font-family: 'Orbitron'; margin-bottom: 15px; }
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; font-size: 20px; width: 100%; text-transform: uppercase; transition: 0.2s; }
        .btn-bet { background: linear-gradient(to bottom, #10b981, #059669); color: #000; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        .btn-cash { background: linear-gradient(to bottom, #f59e0b, #d97706); color: #000; display: none; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }

        /* Navbar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: #64748b; font-size: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; }
    </style>
</head>
<body>

    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-fly" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" loop></audio>
    <audio id="snd-crash" src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3"></audio>

    <div id="auth-screen">
        <h1 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:30px; font-size:35px;">10X<span>BAT</span></h1>
        <div style="background:var(--card); padding:30px; border-radius:25px; width:100%; max-width:400px; border:1px solid rgba(255,255,255,0.1);">
            <input type="text" id="u-login" class="auth-input" placeholder="USERNAME" style="font-size:16px;">
            <input type="password" id="p-login" class="auth-input" placeholder="PASSWORD" style="font-size:16px;">
            <button class="btn btn-bet" onclick="doAuth()">START WINNING</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="user-box" onclick="doLogout()">
                <div class="pfp" id="u-char">K</div>
                <div id="u-name-top" style="font-size:15px; font-weight:bold; letter-spacing:0.5px;">User</div>
            </div>
            <div class="wallet">₹ <span id="user-bal">0</span></div>
        </header>

        <div class="app-content">
            <div id="p-lobby" class="page active">
                <div class="section-title">PREMIUM LOBBY</div>
                <div class="game-grid">
                    <div class="game-card" onclick="openAviator()">
                        <div class="game-icon">🚀</div>
                        <h3>AVIATOR</h3>
                        <p style="color:var(--success); font-size:11px; font-weight:bold;">● LIVE NOW</p>
                    </div>
                    <div class="game-card">
                        <div class="game-icon" style="opacity:0.3;">🎰</div>
                        <h3 style="opacity:0.3;">SLOTS</h3>
                        <p style="color:#64748b; font-size:11px;">COMING SOON</p>
                    </div>
                    <div class="game-card">
                        <div class="game-icon" style="opacity:0.3;">🎲</div>
                        <h3 style="opacity:0.3;">ROULETTE</h3>
                        <p style="color:#64748b; font-size:11px;">COMING SOON</p>
                    </div>
                </div>
            </div>

            <div id="p-aviator" class="page">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <button onclick="nav('lobby')" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:8px 15px; border-radius:10px; font-weight:bold;">← EXIT</button>
                    <div id="hist-list" style="display:flex; gap:5px; overflow-x:auto;"></div>
                </div>
                
                <div class="aviator-box">
                    <div id="countdown-box" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
                        <div id="timer-val">3</div>
                    </div>
                    <div id="multiplier" style="display:none;">1.00x</div>
                    <div id="rocket">🚀</div>
                    <div id="crash-txt" style="position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); color:var(--danger); font-size:28px; font-weight:bold; display:none; font-family:'Orbitron';">FLEW AWAY!</div>
                </div>

                <div class="bet-box">
                    <input type="number" id="bet-amount" value="100" class="auth-input">
                    <button id="btn-bet" class="btn btn-bet" onclick="placeBet()">PLACE BET</button>
                    <button id="btn-cash" class="btn btn-cash" onclick="cashOut()">CASH OUT</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="nav('lobby', this)"><span>🏠</span>Lobby</div>
            <div class="nav-item" onclick="openMaster()"><span>🏦</span>Bank</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser'), isPlaying = false, currentMul = 1.0, gameInterval, betAmt = 0, isBetPlaced = false, canPlaceBet = true;

        const sndTick = document.getElementById('snd-tick');
        const sndFly = document.getElementById('snd-fly');
        const sndCrash = document.getElementById('snd-crash');

        function doAuth() {
            let u = document.getElementById('u-login').value.trim();
            let p = document.getElementById('p-login').value.trim();
            if(!u || !p) return;
            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val().password === p) { localStorage.setItem('activeUser',u); location.reload(); }
                else if(!s.exists()) { db.ref('users/'+u).set({password:p, balance:10000}).then(()=> { localStorage.setItem('activeUser',u); location.reload(); }); }
            });
        }

        function init() {
            if(!curU) return;
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('main-app').style.display='block';
            document.getElementById('u-name-top').innerText = curU;
            document.getElementById('u-char').innerText = curU.charAt(0).toUpperCase();
            db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = Math.floor(s.val() || 0); });
        }

        function nav(p) {
            if(p !== 'aviator') { clearInterval(gameInterval); sndFly.pause(); isPlaying = false; }
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
        }

        function openAviator() { nav('aviator'); startCountdown(); }

        function startCountdown() {
            canPlaceBet = true; resetUI();
            let count = 3; document.getElementById('timer-val').innerText = count;
            let t = setInterval(() => {
                sndTick.play();
                count--;
                if(count > 0) document.getElementById('timer-val').innerText = count;
                else { clearInterval(t); launchRocket(); }
            }, 1000);
        }

        function launchRocket() {
            canPlaceBet = false;
            document.getElementById('countdown-box').style.display = 'none';
            document.getElementById('multiplier').style.display = 'block';
            document.getElementById('rocket').style.display = 'block';
            sndFly.play();
            isPlaying = true; currentMul = 1.0;
            db.ref('game_settings/aviator_crash').once('value', s => {
                let actualCrash = (Math.random() * ((s.val()||3.0) - 1.1) + 1.1).toFixed(2);
                gameInterval = setInterval(() => {
                    currentMul += 0.02 + (currentMul/180);
                    document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                    if(isBetPlaced) {
                        document.getElementById('btn-cash').style.display = 'block';
                        document.getElementById('btn-bet').style.display = 'none';
                        document.getElementById('btn-cash').innerText = "CASH OUT ₹" + Math.floor(betAmt * currentMul);
                    }
                    let r = document.getElementById('rocket');
                    r.style.transform = `translate(${currentMul * 20}px, -${currentMul * 15}px) rotate(-45deg)`;
                    if(currentMul >= actualCrash) crashGame(actualCrash);
                }, 70);
            });
        }

        function crashGame(res) {
            clearInterval(gameInterval); isPlaying = false; isBetPlaced = false;
            sndFly.pause(); sndFly.currentTime = 0; sndCrash.play();
            document.getElementById('multiplier').style.color = 'var(--danger)';
            document.getElementById('crash-txt').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-bet').innerText = "PLACE BET";
            let h = document.createElement('div'); h.style.background='rgba(56,189,248,0.1)'; h.style.padding='2px 8px'; h.style.borderRadius='5px'; h.style.fontSize='10px'; h.innerText=res+'x';
            document.getElementById('hist-list').prepend(h);
            setTimeout(() => { if(document.getElementById('p-aviator').classList.contains('active')) startCountdown(); }, 3000);
        }

        function placeBet() {
            if(!canPlaceBet) return;
            let a = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                if(s.val() >= a) { betAmt = a; isBetPlaced = true; db.ref('users/'+curU).update({balance: s.val()-a}); document.getElementById('btn-bet').innerText = "WAITING..."; }
            });
        }

        function cashOut() {
            if(!isPlaying || !isBetPlaced) return;
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val()+win});
                isBetPlaced = false; betAmt = 0; document.getElementById('btn-cash').style.display='none'; document.getElementById('btn-bet').style.display='block';
            });
        }

        function resetUI() {
            document.getElementById('countdown-box').style.display = 'block';
            document.getElementById('multiplier').style.display = 'none';
            document.getElementById('multiplier').style.color = '#fff';
            document.getElementById('rocket').style.display = 'none';
            document.getElementById('rocket').style.transform = "translate(0,0) rotate(-45deg)";
            document.getElementById('crash-txt').style.display = 'none';
        }

        function doLogout() { localStorage.removeItem('activeUser'); location.reload(); }
        function openMaster() { if(prompt("PIN:")==="9991") alert("Admin Connected!"); }
        init();
    </script>
</body>
</html>
