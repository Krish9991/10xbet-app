<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT MASTER PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; --nav: #0f172a; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--nav); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; }
        .logo { font-family: 'Orbitron'; font-size: 22px; color: var(--text); }
        .logo span { color: var(--primary); }
        .wallet { background: #000; border: 1px solid var(--success); padding: 5px 15px; border-radius: 20px; font-weight: bold; color: var(--success); }
        
        .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #000; }
        .cat-btn { background: var(--card); border: 1px solid #334155; padding: 8px 15px; border-radius: 8px; white-space: nowrap; color: #94a3b8; font-size: 14px; }
        .cat-btn.active { background: var(--primary); color: #000; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card { background: var(--card); border-radius: 12px; border: 1px solid #334155; text-align: center; padding: 10px; }
        .play-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 8px; border-radius: 5px; font-weight: bold; margin-top: 5px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #1e293b; }
        .nav-item { color: #64748b; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--primary); }

        /* Admin Style */
        .admin-card { background: #0f172a; border-left: 4px solid var(--primary); padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .secret-admin-btn { background: transparent; border: 1px solid #1e293b; color: #1e293b; padding: 5px; width: 100%; margin-top: 20px; border-radius: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">10X<span>BAT</span></div>
        <div class="wallet">₹ <span id="user-bal">0</span></div>
    </header>

    <div class="category-bar" id="cat-nav">
        <div class="cat-btn active" onclick="tab('casino', this)">🎰 Casino</div>
        <div class="cat-btn" onclick="tab('slots', this)">🍒 Slots</div>
        <div class="cat-btn" onclick="tab('sports', this)">🏏 Sports</div>
    </div>

    <div class="app-content">
        <div id="p-casino" class="page active">
            <div class="game-grid">
                <div class="game-card"><div>🎲</div><h4>Roulette</h4><button class="play-btn">Play</button></div>
                <div class="game-card"><div>🐉</div><h4>Dragon Tiger</h4><button class="play-btn">Play</button></div>
            </div>
        </div>

        <div id="p-slots" class="page">
            <div class="game-grid" id="slots-area"></div>
        </div>

        <div id="p-sports" class="page">
            <div class="game-card" style="text-align:left;">
                <p>🏏 <b>Live: IND vs AUS</b></p>
                <button class="play-btn" style="width:45%">IND (1.9)</button>
                <button class="play-btn" style="width:45%; background:var(--danger)">AUS (2.1)</button>
            </div>
        </div>

        <div id="p-bank" class="page">
            <h3>Withdraw</h3>
            <div class="game-card">
                <input type="text" id="upi" placeholder="UPI ID" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #334155;">
                <input type="number" id="amt" placeholder="Amount" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #334155;">
                <button class="play-btn" onclick="askWithdraw()">SEND REQUEST</button>
            </div>
            <button class="secret-admin-btn" onclick="nav('master')">ADMIN ACCESS</button>
        </div>

        <div id="p-master" class="page" style="background:#000;">
            <button class="play-btn" style="background:var(--danger); margin-bottom:20px;" onclick="nav('casino')">← BACK</button>
            <h2 style="color:var(--primary)">🛠️ MASTER PANEL</h2>
            <div id="user-list">Loading...</div>
            <hr>
            <h4>Requests</h4>
            <div id="req-list">No Pending.</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('casino', this)">Home</div>
        <div class="nav-item" onclick="nav('slots', this)">Slots</div>
        <div class="nav-item" onclick="nav('bank', this)">Bank</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = "Test_master"; // Set manual for fix

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function tab(t, el) {
            document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active'); nav(t);
        }

        // Realtime Data
        db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = s.val() || 0; });
        
        db.ref('users').on('value', s => {
            let h = ""; s.forEach(c => {
                h += `<div class="admin-card"><span>${c.key}: ₹${c.val().balance}</span><button onclick="editB('${c.key}')" style="background:var(--primary); border:none; padding:5px; border-radius:5px;">Edit</button></div>`;
            });
            document.getElementById('user-list').innerHTML = h;
        });

        db.ref('withdrawals').on('value', s => {
            let h = ""; s.forEach(c => {
                h += `<div class="admin-card"><div>${c.val().user}<br>₹${c.val().amt}</div><button onclick="db.ref('withdrawals/${c.key}').remove()" style="background:var(--success); border:none; padding:5px;">Done</button></div>`;
            });
            document.getElementById('req-list').innerHTML = h || "No requests.";
        });

        function editB(u) { let n = prompt("New Bal:"); if(n) db.ref('users/'+u).update({balance:parseInt(n)}); }
        
        function askWithdraw() {
            let a = parseInt(document.getElementById('amt').value);
            if(a >= 500) {
                db.ref('withdrawals').push({user:curU, amt:a, upi:document.getElementById('upi').value});
                alert("Sent!");
            }
        }

        // Slots generate
        let sH = ""; for(let i=1;i<=10;i++) sH+=`<div class="game-card"><div>🎰</div><h4>Slot ${i}</h4><button class="play-btn">Play</button></div>`;
        document.getElementById('slots-area').innerHTML = sH;
    </script>
</body>
</html>
