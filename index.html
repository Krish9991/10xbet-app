<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT AVIATOR PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --text: #f8fafc; --nav: #0f172a; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--nav); padding: 10px 15px; border-bottom: 2px solid #1e293b; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .pfp { width: 35px; height: 35px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .wallet { background: #000; border: 1px solid var(--success); padding: 5px 12px; border-radius: 20px; color: var(--success); font-weight: bold; }
        
        .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* Aviator Arena */
        .aviator-box { background: #000; border: 2px solid #1e293b; border-radius: 15px; height: 250px; position: relative; overflow: hidden; margin-bottom: 15px; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 30px; transition: all 0.1s linear; transform: rotate(-45deg); z-index: 10; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-family: 'Orbitron'; color: var(--primary); }
        .crash-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: var(--danger); font-size: 24px; font-weight: bold; display: none; }
        
        .bet-box { background: var(--card); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; }
        .btn-bet { background: var(--success); color: #000; font-size: 18px; }
        .btn-cash { background: var(--danger); color: #fff; font-size: 18px; display: none; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #334155; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #1e293b; }
        .nav-item { color: #64748b; font-size: 12px; text-align: center; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        .admin-btn { background: var(--primary); color: #000; border: none; padding: 8px; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="top-row">
            <div class="user-info">
                <div class="pfp" id="u-char">K</div>
                <div id="u-full-name">Test_master</div>
            </div>
            <div class="wallet">₹ <span id="user-bal">...</span></div>
        </div>
    </header>

    <div class="app-content">
        <div id="p-casino" class="page active">
            <div class="game-grid">
                <div class="game-card" onclick="nav('aviator')">
                    <div style="font-size:40px;">🚀</div>
                    <h3>Aviator</h3>
                    <p style="color:var(--success); font-size:12px;">LIVE NOW</p>
                </div>
                <div class="game-card"><div>🎲</div><h3>Roulette</h3></div>
            </div>
        </div>

        <div id="p-aviator" class="page">
            <button class="btn" style="background:#334155; color:#fff; margin-bottom:10px;" onclick="nav('casino')">← Back</button>
            <div class="aviator-box">
                <div id="multiplier">1.00x</div>
                <div id="rocket">🚀</div>
                <div id="crash-txt" class="crash-msg">FLEW AWAY!</div>
            </div>
            <div class="bet-box">
                <input type="number" id="bet-amount" value="100" style="background:#000; border:1px solid #334155; color:#fff; padding:10px; border-radius:8px;">
                <button id="btn-bet" class="btn btn-bet" onclick="startBet()">BET</button>
                <button id="btn-cash" class="btn btn-cash" onclick="cashOut()">CASH OUT</button>
            </div>
        </div>

        <div id="p-master" class="page">
            <button class="btn" style="background:var(--danger); width:100%;" onclick="nav('casino')">Close Master</button>
            <h2 style="color:var(--primary)">🛠️ ADMIN CONTROL</h2>
            <div class="game-card" style="text-align:left;">
                <label><b>Next Auto-Crash Point:</b></label>
                <input type="number" id="set-crash" value="2.5" step="0.1" style="width:100%; padding:10px; margin-top:10px; background:#000; color:#fff; border:1px solid var(--primary);">
                <p style="font-size:12px; color:#64748b; margin-top:5px;">(E.g. 1.5 nakhsho to rocket 1.5x par crash thase)</p>
                <button class="admin-btn" onclick="saveCrash()">SAVE SETTINGS</button>
            </div>
            <hr>
            <div id="user-list"></div>
        </div>

        <div id="p-bank" class="page">
            <h3>Bank</h3>
            <button class="admin-btn" style="background:#1e293b; color:#fff; display:none;" id="admin-trigger" onclick="openMaster()">Admin Panel</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('casino', this)">Home</div>
        <div class="nav-item" onclick="nav('bank', this)">Bank</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser') || "Test_master";
        let isPlaying = false; let currentMul = 1.0; let gameInterval; let betAmt = 0;
        let autoCrashPoint = 2.0;

        // Load Auto-Crash from Firebase
        db.ref('game_settings/aviator_crash').on('value', s => { autoCrashPoint = s.val() || 2.0; });

        function startBet() {
            let amt = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                let bal = s.val();
                if(amt > 0 && bal >= amt) {
                    betAmt = amt;
                    db.ref('users/'+curU).update({balance: bal - amt});
                    document.getElementById('btn-bet').style.display = 'none';
                    document.getElementById('btn-cash').style.display = 'block';
                    runRocket();
                } else { alert("Low Balance!"); }
            });
        }

        function runRocket() {
            isPlaying = true; currentMul = 1.0;
            document.getElementById('crash-txt').style.display = 'none';
            let rocket = document.getElementById('rocket');
            gameInterval = setInterval(() => {
                currentMul += 0.02;
                document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                rocket.style.bottom = (20 + (currentMul * 15)) + "px";
                rocket.style.left = (20 + (currentMul * 15)) + "px";

                if(currentMul >= autoCrashPoint) { crashGame(); }
            }, 100);
        }

        function cashOut() {
            if(!isPlaying) return;
            clearInterval(gameInterval);
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val() + win});
                alert("You Won ₹" + win);
                resetGame();
            });
        }

        function crashGame() {
            clearInterval(gameInterval);
            isPlaying = false;
            document.getElementById('multiplier').style.color = 'red';
            document.getElementById('crash-txt').style.display = 'block';
            setTimeout(resetGame, 2000);
        }

        function resetGame() {
            isPlaying = false; currentMul = 1.0;
            document.getElementById('multiplier').innerText = "1.00x";
            document.getElementById('multiplier').style.color = '#38bdf8';
            document.getElementById('rocket').style.bottom = "20px";
            document.getElementById('rocket').style.left = "20px";
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('crash-txt').style.display = 'none';
        }

        function saveCrash() {
            let val = parseFloat(document.getElementById('set-crash').value);
            db.ref('game_settings').update({aviator_crash: val});
            alert("Auto-Crash set to " + val + "x");
        }

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            if(p==='bank' && curU==='Test_master') document.getElementById('admin-trigger').style.display='block';
        }
        function openMaster() { if(prompt("PIN:")==="9991") nav('master'); }

        db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = s.val() || 0; });
        document.getElementById('u-full-name').innerText = curU;
        nav('casino');
    </script>
</body>
</html>
