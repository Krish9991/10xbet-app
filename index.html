<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT AVIATOR 3-2-1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --text: #f8fafc; --nav: #0f172a; --accent: #f59e0b; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--nav); padding: 10px 15px; border-bottom: 2px solid #1e293b; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .pfp { width: 35px; height: 35px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .wallet { background: #000; border: 1px solid var(--success); padding: 4px 12px; border-radius: 20px; font-weight: bold; color: var(--success); }

        .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* Aviator Arena */
        .aviator-box { background: #000; border: 2px solid #1e293b; border-radius: 15px; height: 230px; position: relative; overflow: hidden; margin-bottom: 15px; background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px); background-size: 15px 15px; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 30px; transition: all 0.1s linear; transform: rotate(-45deg); z-index: 10; display: none; }
        #multiplier { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-family: 'Orbitron'; color: var(--primary); }
        
        /* 3-2-1 Countdown Overlay */
        #countdown-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; }
        .timer-num { color: var(--accent); font-size: 70px; font-family: 'Orbitron'; font-weight: bold; text-shadow: 0 0 20px var(--accent); transition: all 0.3s ease; }
        .wait-msg { font-size: 14px; color: #64748b; font-family: 'Orbitron'; letter-spacing: 2px; }
        
        .crash-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: var(--danger); font-size: 24px; font-weight: bold; display: none; }
        
        .bet-box { background: var(--card); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .auth-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 18px; font-family: 'Orbitron'; }
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; font-size: 18px; width: 100%; text-transform: uppercase; }
        .btn-bet { background: var(--success); color: #000; box-shadow: 0 4px 0 #059669; }
        .btn-bet:active { transform: translateY(2px); box-shadow: 0 2px 0 #059669; }
        .btn-cash { background: var(--accent); color: #000; display: none; box-shadow: 0 4px 0 #d97706; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #1e293b; }
        .nav-item { color: #64748b; font-size: 12px; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="top-row">
            <div class="user-info">
                <div class="pfp" id="u-char">K</div>
                <div id="u-full-name" style="font-weight:bold">Krish</div>
            </div>
            <div class="wallet">₹ <span id="user-bal">0</span></div>
        </div>
    </header>

    <div class="app-content">
        <div id="p-aviator" class="page active">
            <div class="aviator-box">
                <div id="countdown-box">
                    <div class="wait-msg">NEXT ROUND</div>
                    <div id="timer-val" class="timer-num">3</div>
                </div>
                
                <div id="multiplier" style="display:none;">1.00x</div>
                <div id="rocket">🚀</div>
                <div id="crash-txt" class="crash-msg">FLEW AWAY!</div>
            </div>

            <div class="bet-box">
                <div style="color:#64748b; font-size:12px; text-align:center;">BET AMOUNT</div>
                <input type="number" id="bet-amount" value="100" class="auth-input">
                <button id="btn-bet" class="btn btn-bet" onclick="placeBet()">PLACE BET</button>
                <button id="btn-cash" class="btn btn-cash" onclick="cashOut()">CASH OUT (₹0)</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">Aviator</div>
        <div class="nav-item" onclick="alert('Master Panel Bank ma chhe!')">Bank</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser') || "Test_master";
        let isPlaying = false, currentMul = 1.0, gameInterval, betAmt = 0, autoCrashPoint = 2.5;
        let isBetPlaced = false;

        function init() {
            db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = s.val() || 0; });
            db.ref('game_settings/aviator_crash').on('value', s => { autoCrashPoint = s.val() || 2.5; });
            startCountdown();
        }

        function startCountdown() {
            document.getElementById('countdown-box').style.display = 'block';
            document.getElementById('multiplier').style.display = 'none';
            document.getElementById('rocket').style.display = 'none';
            document.getElementById('crash-txt').style.display = 'none';
            
            let count = 3;
            document.getElementById('timer-val').innerText = count;
            
            let timer = setInterval(() => {
                count--;
                if(count > 0) {
                    document.getElementById('timer-val').innerText = count;
                    // Small zoom animation effect
                    document.getElementById('timer-val').style.transform = "scale(1.2)";
                    setTimeout(() => document.getElementById('timer-val').style.transform = "scale(1)", 200);
                } else {
                    clearInterval(timer);
                    launchRocket();
                }
            }, 1000); // 1 SECOND GAP
        }

        function launchRocket() {
            document.getElementById('countdown-box').style.display = 'none';
            document.getElementById('multiplier').style.display = 'block';
            document.getElementById('multiplier').style.color = '#38bdf8';
            document.getElementById('rocket').style.display = 'block';
            
            isPlaying = true; currentMul = 1.0;
            let actualCrash = (Math.random() * (autoCrashPoint - 1.1) + 1.1).toFixed(2);

            gameInterval = setInterval(() => {
                currentMul += 0.04;
                document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                
                if(isBetPlaced) {
                    document.getElementById('btn-cash').style.display = 'block';
                    document.getElementById('btn-bet').style.display = 'none';
                    let liveWin = Math.floor(betAmt * currentMul);
                    document.getElementById('btn-cash').innerText = "CASH OUT ₹" + liveWin;
                }

                let r = document.getElementById('rocket');
                r.style.bottom = (20 + (currentMul * 16)) + "px";
                r.style.left = (20 + (currentMul * 16)) + "px";

                if(currentMul >= actualCrash) { crashGame(); }
            }, 100);
        }

        function placeBet() {
            let a = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                if(s.val() >= a && a > 0) {
                    betAmt = a; isBetPlaced = true;
                    db.ref('users/'+curU).update({balance: s.val() - a});
                    document.getElementById('btn-bet').innerText = "WAITING...";
                    document.getElementById('btn-bet').style.background = "#334155";
                    document.getElementById('btn-bet').disabled = true;
                }
            });
        }

        function cashOut() {
            if(!isPlaying || !isBetPlaced) return;
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val() + win});
                isBetPlaced = false; betAmt = 0;
                alert("CONGRATS! You Won ₹" + win);
                document.getElementById('btn-cash').style.display = 'none';
                document.getElementById('btn-bet').style.display = 'block';
                document.getElementById('btn-bet').innerText = "PLACE BET";
                document.getElementById('btn-bet').style.background = "var(--success)";
                document.getElementById('btn-bet').disabled = false;
            });
        }

        function crashGame() {
            clearInterval(gameInterval); isPlaying = false; isBetPlaced = false; betAmt = 0;
            document.getElementById('multiplier').style.color = 'red';
            document.getElementById('crash-txt').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-bet').innerText = "PLACE BET";
            document.getElementById('btn-bet').style.background = "var(--success)";
            document.getElementById('btn-bet').disabled = false;

            setTimeout(() => {
                document.getElementById('rocket').style.bottom = "20px";
                document.getElementById('rocket').style.left = "20px";
                startCountdown();
            }, 2000);
        }

        init();
    </script>
</body>
</html>
