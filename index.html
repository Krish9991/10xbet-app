<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login Screen */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid #334155; color: var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 16px; font-family: 'Orbitron'; box-sizing: border-box; outline: none; }
        
        /* App Layout */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 12px 15px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .wallet-badge { background: #111; border: 1px solid var(--success); padding: 5px 12px; border-radius: 50px; color: var(--success); font-family: 'Orbitron'; font-size: 13px; }

        .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Aviator */
        .aviator-box { background: #000; border-radius: 20px; height: 220px; position: relative; overflow: hidden; border: 1px solid #1e293b; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 35px; display: none; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-family: 'Orbitron'; }
        
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; font-size: 18px; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: #000; }

        .bottom-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1e293b; }
        .tab-item { color: #64748b; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:20px;">10X<span>BAT</span></h1>
        <div class="auth-card">
            <p style="margin-top:0; color:#64748b;">Create or Login to your ID</p>
            <input type="text" id="u-login" class="auth-input" placeholder="USERNAME">
            <input type="password" id="p-login" class="auth-input" placeholder="PASSWORD">
            <button class="btn btn-primary" onclick="doAuth()">LOGIN / SIGNUP</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="font-family:'Orbitron'; font-weight:800; font-size:18px;">10X<span>BAT</span></div>
            <div class="wallet-badge">₹ <span id="user-bal">0</span></div>
        </header>

        <div class="app-content">
            <div id="p-home" class="page active">
                <div style="background: linear-gradient(45deg, #1e293b, #0f172a); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
                    <h2 style="margin:0; font-family:'Orbitron';">WELCOME</h2>
                    <p id="display-user" style="color:var(--primary); margin:5px 0 0; font-weight:bold;"></p>
                </div>
                <div class="grid-2">
                    <div class="cat-card" onclick="nav('aviator')">
                        <div style="font-size:40px;">🚀</div>
                        <h3>AVIATOR</h3>
                        <p style="color:var(--success); font-size:10px;">LIVE NOW</p>
                    </div>
                    <div class="cat-card" onclick="nav('profile')">
                        <div style="font-size:40px;">👤</div>
                        <h3>MY BANK</h3>
                        <p style="color:#64748b; font-size:10px;">ID DETAILS</p>
                    </div>
                </div>
            </div>

            <div id="p-aviator" class="page">
                <button onclick="nav('home')" style="background:none; border:none; color:var(--primary); font-weight:bold; margin-bottom:10px;">← BACK</button>
                <div class="aviator-box">
                    <div id="multiplier" style="top:50%">1.00x</div>
                    <div id="rocket">🚀</div>
                </div>
                <button class="btn btn-success" onclick="alert('Betting starts soon!')">PLACE BET</button>
            </div>

            <div id="p-profile" class="page">
                <div class="cat-card">
                    <div style="font-size:50px; margin-bottom:10px;">👤</div>
                    <h2 id="u-name-profile">User</h2>
                    <button class="btn" style="background:var(--danger); color:#fff;" onclick="localStorage.clear(); location.reload();">LOGOUT</button>
                </div>
            </div>
        </div>

        <div class="bottom-tabs">
            <div class="tab-item active" onclick="nav('home', this)"><span>🏠</span>Home</div>
            <div class="tab-item" onclick="nav('profile', this)"><span>👤</span>Profile</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser');

        function doAuth() {
            let u = document.getElementById('u-login').value.trim();
            let p = document.getElementById('p-login').value.trim();
            if(!u || !p) { alert("Please enter Username & Password"); return; }
            
            db.ref('users/'+u).once('value', s => {
                if(s.exists()) {
                    if(s.val().password === p) {
                        loginSuccess(u);
                    } else {
                        alert("Wrong Password!");
                    }
                } else {
                    // Create New User
                    db.ref('users/'+u).set({password: p, balance: 500}).then(() => {
                        loginSuccess(u);
                    });
                }
            });
        }

        function loginSuccess(u) {
            localStorage.setItem('activeUser', u);
            location.reload();
        }

        function init() {
            if(curU) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('display-user').innerText = "ID: " + curU;
                document.getElementById('u-name-profile').innerText = curU;
                db.ref('users/'+curU+'/balance').on('value', s => {
                    document.getElementById('user-bal').innerText = s.val() || 0;
                });
            }
        }

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            if(el) {
                document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
                el.classList.add('active');
            }
        }

        init();
    </script>
</body>
</html>
