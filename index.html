<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT ULTIMATE PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: rgba(30, 41, 59, 0.6); --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; height: 100vh; overflow: hidden; }
        
        header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .wallet { background: #000; border: 1.5px solid var(--success); padding: 5px 15px; border-radius: 50px; font-weight: bold; color: var(--success); font-family: 'Orbitron'; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        .app-content { padding: 20px; flex: 1; overflow-y: auto; }
        
        /* Aviator Arena */
        .aviator-box { background: #000; border-radius: 20px; height: 250px; position: relative; overflow: hidden; margin-bottom: 20px; border: 1.5px solid rgba(56, 189, 248, 0.2); }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 38px; z-index: 10; display: none; filter: drop-shadow(0 0 15px #ff4d4d); transition: transform 0.05s linear; }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 65px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4); z-index: 5; }
        
        #countdown-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 50; }
        #timer-val { font-size: 75px; color: var(--accent); font-family: 'Orbitron'; font-weight: 800; text-shadow: 0 0 25px var(--accent); }

        /* Super Smooth Buttons */
        .bet-box { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; background: #000; border: 1px solid #334155; color: var(--accent); padding: 15px; border-radius: 15px; text-align: center; font-size: 24px; font-family: 'Orbitron'; margin-bottom: 15px; outline: none; }
        
        .btn { border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; font-family: 'Rajdhani'; font-size: 22px; width: 100%; text-transform: uppercase; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-bet { background: linear-gradient(180deg, #10b981, #059669); color: #000; box-shadow: 0 6px 0 #047857, 0 10px 20px rgba(16, 185, 129, 0.4); }
        .btn-bet:active { transform: translateY(4px); box-shadow: 0 2px 0 #047857; }
        
        .btn-cash { background: linear-gradient(180deg, #f59e0b, #d97706); color: #000; display: none; box-shadow: 0 6px 0 #b45309, 0 10px 20px rgba(245, 158, 11, 0.4); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        
        .btn-disabled { background: #1e293b !important; color: #475569 !important; box-shadow: none !important; cursor: not-allowed; transform: none !important; }
    </style>
</head>
<body>

    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-fly" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" loop></audio>
    <audio id="snd-crash" src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3"></audio>

    <header>
        <div style="font-family:'Orbitron'; font-weight:800; font-size:20px;">10X<span>BAT</span></div>
        <div class="wallet">₹ <span id="user-bal">0</span></div>
    </header>

    <div class="app-content">
        <div class="aviator-box">
            <div id="countdown-box"><div id="timer-val">3</div></div>
            <div id="multiplier" style="display:none;">1.00x</div>
            <div id="rocket">🚀</div>
            <div id="crash-txt" style="position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); color:var(--danger); font-size:30px; font-weight:bold; display:none; font-family:'Orbitron';">FLEW AWAY!</div>
        </div>

        <div class="bet-box">
            <input type="number" id="bet-amount" value="100" class="auth-input">
            <button id="btn-bet" class="btn btn-bet" onclick="placeBet()">PLACE BET</button>
            <button id="btn-cash" class="btn btn-cash" onclick="cashOut()">CASH OUT</button>
        </div>
        
        <div id="hist-list" style="display:flex; gap:8px; margin-top:20px; overflow-x:auto; padding-bottom:10px;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser') || "Krish", isPlaying = false, currentMul = 1.0, gameInterval, betAmt = 0, isBetPlaced = false, canPlaceBet = true;

        const sndTick = document.getElementById('snd-tick');
        const sndFly = document.getElementById('snd-fly');
        const sndCrash = document.getElementById('snd-crash');

        function init() {
            db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = Math.floor(s.val() || 0); });
            startCountdown();
        }

        function startCountdown() {
            canPlaceBet = true;
            document.getElementById('btn-bet').classList.remove('btn-disabled');
            document.getElementById('btn-bet').innerText = "PLACE BET";
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            
            document.getElementById('countdown-box').style.display = 'block';
            document.getElementById('multiplier').style.display = 'none';
            document.getElementById('rocket').style.display = 'none';
            document.getElementById('crash-txt').style.display = 'none';
            
            let count = 3; document.getElementById('timer-val').innerText = count;
            let t = setInterval(() => {
                sndTick.play();
                count--;
                if(count > 0) document.getElementById('timer-val').innerText = count;
                else { clearInterval(t); launchRocket(); }
            }, 1000);
        }

        function launchRocket() {
            canPlaceBet = false;
            document.getElementById('countdown-box').style.display = 'none';
            document.getElementById('multiplier').style.display = 'block';
            document.getElementById('rocket').style.display = 'block';
            document.getElementById('multiplier').style.color = '#fff';
            sndFly.play();
            
            isPlaying = true; currentMul = 1.0;
            
            // MASTER PROFIT LOGIC (High chance of long fly)
            let baseMax = 2.5; 
            db.ref('game_settings/aviator_crash').once('value', s => {
                let adminMax = s.val() || 5.0;
                // Randomly decide if this round is a "Big Win"
                let isJackpot = Math.random() > 0.7; 
                let actualCrash = isJackpot ? (Math.random() * (adminMax - 2.0) + 2.0) : (Math.random() * (2.0 - 1.1) + 1.1);
                actualCrash = parseFloat(actualCrash).toFixed(2);

                gameInterval = setInterval(() => {
                    // Smooth Multiplier speed
                    let increment = 0.01 + (currentMul / 180);
                    currentMul += increment;
                    document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                    
                    if(isBetPlaced) {
                        document.getElementById('btn-cash').style.display = 'block';
                        document.getElementById('btn-bet').style.display = 'none';
                        document.getElementById('btn-cash').innerText = "CASH OUT ₹" + Math.floor(betAmt * currentMul);
                    } else {
                        document.getElementById('btn-bet').classList.add('btn-disabled');
                        document.getElementById('btn-bet').innerText = "FLYING...";
                    }
                    
                    let r = document.getElementById('rocket');
                    r.style.transform = `translate(${currentMul * 22}px, -${currentMul * 16}px) rotate(-45deg)`;
                    
                    if(currentMul >= actualCrash) crashGame(actualCrash);
                }, 60);
            });
        }

        function placeBet() {
            if(!canPlaceBet) return;
            let a = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                if(s.val() >= a && a > 0) {
                    betAmt = a; isBetPlaced = true;
                    db.ref('users/'+curU).update({balance: s.val() - a});
                    document.getElementById('btn-bet').innerText = "WAITING...";
                    document.getElementById('btn-bet').classList.add('btn-disabled');
                }
            });
        }

        function cashOut() {
            if(!isPlaying || !isBetPlaced) return;
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val() + win});
                isBetPlaced = false; betAmt = 0;
                document.getElementById('btn-cash').style.display = 'none';
                document.getElementById('btn-bet').style.display = 'block';
                document.getElementById('btn-bet').innerText = "FLYING...";
            });
        }

        function crashGame(res) {
            clearInterval(gameInterval); isPlaying = false; isBetPlaced = false;
            sndFly.pause(); sndFly.currentTime = 0; sndCrash.play();
            document.getElementById('multiplier').style.color = 'var(--danger)';
            document.getElementById('crash-txt').style.display = 'block';
            
            let h = document.createElement('div');
            h.style.background='rgba(56,189,248,0.1)'; h.style.padding='4px 10px'; h.style.borderRadius='8px'; h.style.fontSize='12px'; h.style.color='var(--primary)'; h.style.border='1px solid var(--primary)';
            h.innerText = res + 'x';
            document.getElementById('hist-list').prepend(h);
            if(document.getElementById('hist-list').children.length > 8) document.getElementById('hist-list').lastChild.remove();

            setTimeout(() => { startCountdown(); }, 3000);
        }

        init();
    </script>
</body>
</html>
