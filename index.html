<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010409; --card: #0d1117; --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; --accent: #f59e0b; --text: #f0f6fc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Auth Screen */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; }
        .auth-box { background: var(--card); padding: 35px 25px; border-radius: 25px; width: 100%; max-width: 380px; border: 1px solid #30363d; text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid #30363d; color: var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: 'Orbitron'; font-size: 16px; text-align: center; outline: none; }

        /* App UI */
        #main-app { display: none; flex-direction: column; height: 100vh; width: 100%; }
        header { background: #000; padding: 12px 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; height: 65px; flex-shrink: 0; }
        .logo { font-family: 'Orbitron'; font-weight: 800; font-size: 18px; }
        .wallet-box { background: #111; border: 1.5px solid var(--success); padding: 5px 15px; border-radius: 50px; color: var(--success); font-family: 'Orbitron'; font-size: 13px; }

        .viewport { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Lobby UI */
        .hero { background: linear-gradient(135deg, #0f172a, #1e293b); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(56, 189, 248, 0.2); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: var(--card); border-radius: 18px; padding: 25px 15px; text-align: center; border: 1px solid #30363d; position: relative; }
        .game-card:active { transform: scale(0.95); background: #161b22; }

        /* Aviator Fix */
        .aviator-box { background: #000; border-radius: 20px; height: 230px; position: relative; overflow: hidden; margin-bottom: 15px; border: 2px solid #30363d; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 38px; display: none; filter: drop-shadow(0 0 15px var(--danger)); }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-family: 'Orbitron'; color: #fff; }
        #timer-val { font-size: 70px; color: var(--accent); font-family: 'Orbitron'; font-weight: bold; }

        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Rajdhani'; font-size: 20px; width: 100%; text-transform: uppercase; }
        .btn-green { background: linear-gradient(180deg, var(--success), #166534); color: #fff; }
        .btn-orange { background: linear-gradient(180deg, var(--accent), #d97706); color: #000; display: none; }

        nav { background: #000; height: 75px; border-top: 1px solid #30363d; display: flex; justify-content: space-around; align-items: center; }
        .nav-tab { color: #8b949e; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; }
        .nav-tab.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:35px; margin-bottom:30px;">10X<span>BAT</span></h1>
        <div class="auth-box">
            <input type="text" id="u-login" class="auth-input" placeholder="USERNAME">
            <input type="password" id="p-login" class="auth-input" placeholder="PASSWORD">
            <button class="btn btn-green" onclick="doAuth()">LOGIN / JOIN</button>
            <p style="color:#8b949e; margin-top:15px; font-size:12px;">Welcome to India's #1 Bookie</p>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo">10X<span>BAT</span></div>
            <div class="wallet-box">₹ <span id="user-bal">0</span></div>
        </header>

        <div class="viewport">
            <div id="p-home" class="page active">
                <div class="hero">
                    <h2 style="margin:0; font-family:'Orbitron'; color:var(--primary); font-size:20px;">VIP LOBBY</h2>
                    <p style="color:#8b949e; margin:5px 0 0; font-weight:bold;">Account: <span id="u-display" style="color:#fff">...</span></p>
                </div>
                <div class="grid-2">
                    <div class="game-card" onclick="openAviator()">
                        <div style="font-size:40px; margin-bottom:10px;">🚀</div>
                        <h3 style="margin:0;">AVIATOR</h3>
                        <p style="color:var(--success); font-size:10px; font-weight:bold;">● LIVE</p>
                    </div>
                    <div class="game-card" onclick="alert('Cricket Odds Soon!')">
                        <div style="font-size:40px; margin-bottom:10px;">🏏</div>
                        <h3 style="margin:0;">SPORTS</h3>
                        <p style="color:#8b949e; font-size:10px;">IPL MATCH</p>
                    </div>
                </div>
            </div>

            <div id="p-aviator" class="page">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <button onclick="nav('home')" style="background:#161b22; border:1px solid #30363d; color:#fff; padding:6px 12px; border-radius:10px; font-weight:bold;">← BACK</button>
                    <div id="hist-list" style="display:flex; gap:5px;"></div>
                </div>
                <div class="aviator-box">
                    <div id="countdown-box" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
                        <div id="timer-val">3</div>
                    </div>
                    <div id="multiplier" style="display:none;">1.00x</div>
                    <div id="rocket">🚀</div>
                    <div id="crash-txt" style="position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); color:var(--danger); font-size:25px; font-weight:bold; display:none;">FLEW AWAY!</div>
                </div>
                <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid #30363d;">
                    <input type="number" id="bet-amount" value="100" class="auth-input" style="font-size:24px;">
                    <button id="btn-bet" class="btn btn-green" onclick="placeBet()">PLACE BET</button>
                    <button id="btn-cash" class="btn btn-orange" onclick="cashOut()">CASH OUT</button>
                </div>
            </div>

            <div id="p-profile" class="page">
                <div style="text-align:center; padding:30px; background:var(--card); border-radius:25px; border:1px solid #30363d;">
                    <div style="width:70px; height:70px; background:var(--primary); border-radius:20px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:30px; color:#000; font-weight:bold;" id="u-char">?</div>
                    <h2 id="u-profile-name" style="margin:0; font-family:'Orbitron';">User</h2>
                    <button class="btn" style="background:var(--danger); color:#fff; margin-top:20px;" onclick="localStorage.clear(); location.reload();">LOGOUT ID</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-tab active" onclick="nav('home', this)"><span>🏠</span>Home</div>
            <div class="nav-tab" onclick="nav('profile', this)"><span>👤</span>Profile</div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const config = { apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com", projectId: "xbat-5c582" };
        firebase.initializeApp(config); const db = firebase.database();
        let curU = localStorage.getItem('activeUser'), isPlaying = false, currentMul = 1.0, gameInterval, betAmt = 0, isBetPlaced = false, canPlaceBet = true;

        function doAuth() {
            let u = document.getElementById('u-login').value.trim();
            let p = document.getElementById('p-login').value.trim();
            if(!u || !p) return;
            db.ref('users/'+u).once('value', s => {
                if(s.exists()) {
                    if(s.val().password === p) { localStorage.setItem('activeUser',u); location.reload(); }
                    else alert("Wrong Pass!");
                } else {
                    db.ref('users/'+u).set({password:p, balance:10000}).then(()=>{ localStorage.setItem('activeUser',u); location.reload(); });
                }
            });
        }

        function init() {
            if(curU) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('u-display').innerText = curU;
                document.getElementById('u-profile-name').innerText = curU;
                document.getElementById('u-char').innerText = curU.charAt(0).toUpperCase();
                db.ref('users/'+curU+'/balance').on('value', s => { document.getElementById('user-bal').innerText = Math.floor(s.val() || 0); });
            }
        }

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            if(el) { document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }
            if(p !== 'aviator') stopGame();
        }

        function openAviator() { nav('aviator'); startCountdown(); }

        function startCountdown() {
            canPlaceBet = true; resetAviatorUI();
            let count = 3; document.getElementById('timer-val').innerText = count;
            let t = setInterval(() => { count--;
                if(count > 0) document.getElementById('timer-val').innerText = count;
                else { clearInterval(t); launchRocket(); }
            }, 1000);
        }

        function launchRocket() {
            canPlaceBet = false;
            document.getElementById('countdown-box').style.display = 'none';
            document.getElementById('multiplier').style.display = 'block';
            document.getElementById('rocket').style.display = 'block';
            isPlaying = true; currentMul = 1.0;
            db.ref('game_settings/aviator_crash').once('value', s => {
                let actualCrash = (Math.random() * ((s.val()||4.0) - 1.1) + 1.1).toFixed(2);
                gameInterval = setInterval(() => {
                    currentMul += 0.02 + (currentMul/160);
                    document.getElementById('multiplier').innerText = currentMul.toFixed(2) + "x";
                    if(isBetPlaced) {
                        document.getElementById('btn-cash').style.display = 'block';
                        document.getElementById('btn-bet').style.display = 'none';
                        document.getElementById('btn-cash').innerText = "CASH OUT ₹" + Math.floor(betAmt * currentMul);
                    }
                    let r = document.getElementById('rocket');
                    r.style.transform = `translate(${currentMul * 20}px, -${currentMul * 15}px) rotate(-45deg)`;
                    if(currentMul >= actualCrash) crashGame(actualCrash);
                }, 80);
            });
        }

        function crashGame(res) {
            clearInterval(gameInterval); isPlaying = false; isBetPlaced = false;
            document.getElementById('multiplier').style.color = 'var(--danger)';
            document.getElementById('crash-txt').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-bet').innerText = "PLACE BET";
            setTimeout(() => { if(document.getElementById('p-aviator').classList.contains('active')) startCountdown(); }, 3000);
        }

        function placeBet() {
            if(!canPlaceBet) return;
            let a = parseInt(document.getElementById('bet-amount').value);
            db.ref('users/'+curU+'/balance').once('value', s => {
                if(s.val() >= a) { betAmt = a; isBetPlaced = true; db.ref('users/'+curU).update({balance: s.val()-a}); document.getElementById('btn-bet').innerText = "WAITING..."; }
            });
        }

        function cashOut() {
            if(!isPlaying || !isBetPlaced) return;
            let win = Math.floor(betAmt * currentMul);
            db.ref('users/'+curU+'/balance').once('value', s => {
                db.ref('users/'+curU).update({balance: s.val()+win});
                isBetPlaced = false; betAmt = 0; document.getElementById('btn-cash').style.display='none'; document.getElementById('btn-bet').style.display='block';
            });
        }

        function resetAviatorUI() {
            document.getElementById('countdown-box').style.display = 'block';
            document.getElementById('multiplier').style.display = 'none';
            document.getElementById('multiplier').style.color = '#fff';
            document.getElementById('rocket').style.display = 'none';
            document.getElementById('rocket').style.transform = "translate(0,0) rotate(-45deg)";
            document.getElementById('crash-txt').style.display = 'none';
        }

        function stopGame() { clearInterval(gameInterval); isPlaying = false; }
        init();
    </script>
</body>
</html>
