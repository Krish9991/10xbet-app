<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10X-BAT OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --danger: #ef4444; --accent: #f59e0b; --text: #f8fafc; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; }
        header { background: rgba(15, 23, 42, 0.95); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .wallet { background: #000; border: 1px solid var(--success); color: var(--success); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .app-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 5px; border-top: 1px solid #334155; }
        .nav-item { color: #64748b; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="font-family:'Orbitron'">10X<span>BAT</span></h1>
            <input type="text" id="u" class="auth-input" placeholder="Username">
            <input type="password" id="p" class="auth-input" placeholder="Password">
            <button class="auth-btn" style="background:var(--primary)" onclick="doAuth('login')">LOGIN</button>
            <button class="auth-btn" style="background:transparent; color:var(--primary); margin-top:10px;" onclick="doAuth('signup')">CREATE ACCOUNT</button>
        </div>
    </div>
    <div id="main-app" style="display:none;">
        <header>
            <div style="font-family:'Orbitron'">10X<span>BAT</span></div>
            <div class="wallet">₹ <span id="bal">...</span></div>
        </header>
        <div class="app-content">
            <div id="p-home" class="page active"><h3>Welcome, <span id="user-display"></span></h3><p>Games and betting coming soon...</p></div>
            <div id="p-bank" class="page">
                <h3>Withdraw</h3>
                <input type="text" id="upi" class="auth-input" placeholder="UPI ID">
                <input type="number" id="amt" class="auth-input" placeholder="Amount">
                <button class="auth-btn" style="background:var(--success)" onclick="withdraw()">WITHDRAW NOW</button>
            </div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="nav('home', this)">Home</div>
            <div class="nav-item" onclick="nav('bank', this)">Bank</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const conf = { 
            apiKey: "AIzaSyDdURW00a3AheG1SZI67Itu_LZ9ddPBWG0", 
            databaseURL: "https://xbat-5c582-default-rtdb.firebaseio.com",
            projectId: "xbat-5c582" 
        };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let curUser = ""; let curBal = 0;

        function doAuth(type) {
            let u = document.getElementById('u').value.trim();
            let p = document.getElementById('p').value.trim();
            if(!u || !p) return alert("Fill all!");
            db.ref('users/' + u).once('value', (s) => {
                if(type === 'login') {
                    if(s.exists() && s.val().password === p) { curUser = u; curBal = s.val().balance; start(); }
                    else alert("Wrong ID/PW");
                } else {
                    if(s.exists()) alert("User Exists!");
                    else db.ref('users/' + u).set({ password: p, balance: 10000 }).then(() => { curUser = u; curBal = 10000; start(); });
                }
            });
        }
        function start() {
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('main-app').style.display = "block";
            document.getElementById('user-display').innerText = curUser;
            updateUI();
            db.ref('users/' + curUser + '/balance').on('value', (s) => { if(s.exists()){ curBal = s.val(); updateUI(); }});
        }
        function updateUI() { document.getElementById('bal').innerText = curBal; }
        function nav(p, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active'); el.classList.add('active');
        }
        function withdraw() {
            let upi = document.getElementById('upi').value;
            let a = parseInt(document.getElementById('amt').value);
            if(a >= 500 && a <= curBal) {
                db.ref('users/' + curUser).update({ balance: curBal - a });
                db.ref('withdrawals').push({ user: curUser, upi: upi, amount: a, time: new Date().toLocaleString() });
                alert("Request Sent!");
            } else alert("Invalid Amount/Balance!");
        }
    </script>
</body>
</html>
